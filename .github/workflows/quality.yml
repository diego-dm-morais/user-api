# Reusable quality gate: lint, format check, type check, tests+coverage,
# security scans. Called by both pr-checks.yml and release.yml so the checks
# are defined once (DRY) and always identical between PR and release.
name: Quality

on:
  workflow_call:

# Declared explicitly here (not just at the caller) so this workflow is
# blindered to read-only even if reused elsewhere without restricting it.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
      - run: uv sync --all-extras --dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src
      - run: uv run pytest tests/unit tests/contract tests/integration -q --cov=src --cov-report=term-missing
      - run: uv run bandit -r src
      - run: uv run pip-audit
