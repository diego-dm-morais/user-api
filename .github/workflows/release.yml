# Runs on every push to main (i.e. after a PR from develop is merged).
# Re-runs the same quality gate as pr-checks.yml (belt-and-braces — a direct
# push or an admin-merged PR may not have gone through it), then:
#   1. bumps a semver tag from Conventional Commits since the last tag
#   2. builds the Docker image and pushes it to GHCR, tagged with that
#      version + the commit SHA + `latest`
#   3. creates a GitHub Release with auto-generated notes from the commits
#      merged since the previous tag
#
# Tagging uses mathieudutour/github-tag-action (Conventional Commits ->
# semver) instead of a hand-rolled commit parser; release notes use GitHub's
# native auto-generated notes (softprops/action-gh-release) instead of a
# second changelog tool.
#
# Versioning note: the semver bump is driven entirely by Conventional Commit
# messages on `main` since the last tag (see `tag` job below) — there is no
# manual version file to edit. The control for who can influence a release,
# then, is branch protection on `main` (no direct pushes, required PR review)
# rather than anything enforced in this workflow.
name: Release

on:
  push:
    branches: [main]

# No workflow-level `permissions:` — each job below declares only the scope
# it needs (least privilege), instead of granting write access to every job
# including the ones that only read.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    permissions:
      contents: read
    uses: ./.github/workflows/quality.yml

  tag:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-and-push:
    runs-on: ubuntu-latest
    needs: tag
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless signing via GITHUB_TOKEN OIDC
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image (keyless, via GITHUB_TOKEN OIDC)
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}

  release:
    runs-on: ubuntu-latest
    needs: [tag, build-and-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
